services:
  app:
    image: ${PAYLOAD_IMAGE:-ghcr.io/q275343119/payloadcms:latest}
    pull_policy: always
    env_file:
      - .env.production
    environment:
      PORT: '3000'
    ports:
      - '127.0.0.1:${PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  migrate:
    image: ${PAYLOAD_IMAGE:-ghcr.io/q275343119/payloadcms:latest}
    pull_policy: always
    env_file:
      - .env.production
    command: ['./node_modules/.bin/payload', 'migrate']
    profiles: ['tools']
    restart: 'no'
