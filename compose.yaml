services:
  app:
    image: payload-blog:latest
    build:
      context: .
      args:
        R2_PUBLIC_URL: ${R2_PUBLIC_URL:?Run docker compose with --env-file .env.production}
    env_file:
      - .env.production
    ports:
      - '127.0.0.1:${PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  migrate:
    image: payload-blog:latest
    env_file:
      - .env.production
    command: ['./node_modules/.bin/payload', 'migrate']
    profiles: ['tools']
    restart: 'no'
