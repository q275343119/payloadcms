services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_USER: payload
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - payload-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d payload']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  payload-postgres-data:
